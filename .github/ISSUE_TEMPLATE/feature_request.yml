name: Feature Request
description: Propose a new capability, provider, or enhancement
title: "[FEAT] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem and your proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? Who benefits?
      placeholder: "Currently there's no way to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature, API shape, or integration. Be as specific as possible.
      placeholder: "Add a new provider preset for Groq in settings.ts..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you think of? Why is this one better?
  - type: textarea
    id: implementation
    attributes:
      label: Implementation Notes
      description: Any technical details, files to touch, or migration steps?
      placeholder: "Files to modify: settings.ts (add preset), health_check.ts (add check)..."
  - type: checkboxes
    id: willingness
    attributes:
      label: Willingness to Contribute
      options:
        - label: I can implement this (may need guidance)
        - label: I can test/review a PR for this
        - label: I can write docs for this
        - label: I'm just suggesting — no implementation capacity
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues/discussions for duplicates
          required: true
        - label: This is a single, focused feature (not a mega-feature)
          required: true