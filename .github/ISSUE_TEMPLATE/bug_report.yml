name: Bug Report
description: Report a crash, hang, incorrect behavior, or regression
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A clear, one-sentence description of the bug.
      placeholder: "e.g., Critic loop never terminates when provider returns 402"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Run these commands and paste the output:
        ```bash
        bun --version
        node --version
        # OS info (Windows: `ver`, Linux: `lsb_release -a`, macOS: `sw_vers`)
        ```
      value: |
        OS:
        Bun version:
        Node version:
        LLM Provider(s):
        Routing Mode:
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Numbered steps to reproduce the bug.
      placeholder: |
        1. Start orchestrator: `cd mini-services/research-orchestrator && bun run dev`
        2. Start frontend: `bun run dev` (in root)
        3. Open http://localhost:3000
        4. Enter query: "Your exact query here"
        5. Click Launch Research
        6. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages, stack traces, console logs.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste orchestrator terminal output and/or browser console errors.
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Recordings
      description: Drag & drop images or link to a short screen recording (for UI bugs).
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Related issues, recent changes, workarounds tried, etc.
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues (open + closed)
          required: true
        - label: I reproduced this on the latest `main` branch
          required: true
        - label: I included all environment details above
          required: true
        - label: I attached relevant logs/screenshots
          required: true